    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.

      window.Babel.transformScriptTags();
    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Kiki — Hiring Health Quiz<\u002Ftitle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* latin */\n@font-face {\n  font-family: 'Gupter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"26ec924c-977a-4c35-910f-7f7c83c13c3e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin */\n@font-face {\n  font-family: 'Gupter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8c1d39ff-044a-43e4-8670-562b081da482\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  @font-face{\n    font-family:'Cartograph CF';\n    src:url(\"e7494e11-ce84-4b36-b400-133ee5a57df5\") format('woff');\n    font-weight:400; font-style:normal; font-display:swap;\n  }\n  :root{\n    --cream:#FFF2E9;\n    --brown:#532822;\n    --yellow:#FFD05D;\n    --peach:#FF834C;\n    --white:#ffffff;\n    --muted:#9a8a85;\n    --opt-border:#e0d8d4;\n    --circle:#c8bfbb;\n    --sel-bg:#FFFBF0;\n    --gupter:'Gupter', Georgia, serif;\n    --mono:'Cartograph CF', 'Courier New', monospace;\n  }\n  *{box-sizing:border-box; margin:0; padding:0;}\n  html,body{height:100%;}\n  body{\n    font-family:var(--mono);\n    color:var(--brown);\n    background-color:var(--cream);\n    -webkit-font-smoothing:antialiased;\n    min-height:100vh;\n  }\n\n  /* ---------- TOP PROGRESS (no header) ---------- */\n  #header{\n    max-width:580px; margin:0 auto;\n  }\n  .progress-wrap{\n    padding:18px 16px 0;\n  }\n  .progress-label{\n    font-family:var(--mono); font-size:11px; letter-spacing:0.08em;\n    text-transform:uppercase; color:var(--muted); margin-bottom:7px;\n  }\n  .progress-track{\n    height:4px; width:100%; background:rgba(83,40,34,0.12);\n    border-radius:2px; overflow:hidden;\n  }\n  .progress-fill{\n    height:100%; width:0%; background:var(--yellow);\n    border-radius:2px; transition:width .45s cubic-bezier(.2,.8,.2,1);\n  }\n  #header.hide-progress{display:none;}\n\n  /* ---------- LAYOUT ---------- */\n  main{\n    max-width:580px; margin:0 auto;\n    padding:24px 16px 48px;\n  }\n  .screen{display:none;}\n  .screen.active{display:block; opacity:1; animation:screenIn .5s cubic-bezier(.2,.8,.2,1);}\n  /* Transform-only entrance: opacity stays 1 so a paused/throttled animation clock never hides content. */\n  @keyframes screenIn{\n    from{transform:translateY(14px);}\n    to{transform:translateY(0);}\n  }\n\n  /* ---------- CARDS (uniform white) ---------- */\n  .card{\n    background:var(--white);\n    border-radius:16px;\n    border:0.5px solid var(--opt-border);\n    box-shadow:0 6px 24px rgba(83,40,34,0.06), 0 1px 2px rgba(83,40,34,0.04);\n    padding:28px 24px;\n  }\n\n  /* ---------- TYPE ---------- */\n  h1,h2,h3{font-family:var(--gupter); font-weight:400; line-height:1.18; text-wrap:balance;}\n  .label{\n    font-family:var(--mono); font-size:10px; letter-spacing:0.12em;\n    text-transform:uppercase; font-weight:400; color:var(--muted);\n  }\n  .label-badge{\n    display:inline-block; color:var(--muted);\n    margin-bottom:8px;\n  }\n  .subtext{font-family:var(--mono); font-size:14px; line-height:1.7; color:var(--brown); opacity:0.78;}\n\n  /* ---------- BUTTONS ---------- */\n  button{font-family:var(--mono); cursor:pointer; border:none; background:none; color:inherit;}\n  .btn-primary{\n    background:var(--yellow); color:var(--brown);\n    font-weight:400; font-size:15px; letter-spacing:0.01em;\n    padding:16px 26px; border-radius:99px; min-height:52px;\n    transition:transform .15s ease, filter .15s ease;\n  }\n  .btn-primary:hover{filter:brightness(0.97); transform:translateY(-1px);}\n  .btn-primary:active{transform:translateY(0);}\n  .btn-brown{\n    background:var(--brown); color:var(--white);\n    font-weight:400; font-size:15px; letter-spacing:0.01em;\n    padding:16px 26px; border-radius:99px; min-height:52px;\n    transition:transform .15s ease, filter .15s ease;\n  }\n  .btn-brown:hover{filter:brightness(1.12); transform:translateY(-1px);}\n  .btn-ghost{\n    background:transparent; border:1.5px solid var(--brown); color:var(--brown);\n    font-weight:400; font-size:14px; letter-spacing:0.01em;\n    padding:13px 26px; border-radius:99px; min-height:48px;\n    transition:background .15s ease, color .15s ease;\n  }\n  .btn-ghost:hover{background:var(--brown); color:var(--white);}\n  .btn-block{display:block; width:100%; text-align:center;}\n\n  /* ---------- ANSWER OPTIONS (radio style) ---------- */\n  .options{display:flex; flex-direction:column; gap:10px; margin-top:4px;}\n  .option{\n    width:100%; text-align:left;\n    background:var(--white); color:var(--brown);\n    font-family:var(--mono); font-size:15px; line-height:1.35;\n    border:1px solid var(--opt-border); border-radius:12px;\n    padding:16px 18px; min-height:56px;\n    display:flex; align-items:center; gap:12px;\n    transition:border-color .15s ease, background .12s ease;\n  }\n  .option:hover{border-color:var(--yellow);}\n  .opt-circle{\n    width:20px; height:20px; border-radius:50%;\n    border:1.5px solid var(--circle); background:transparent;\n    flex-shrink:0; display:flex; align-items:center; justify-content:center;\n    transition:background .12s ease, border-color .12s ease;\n  }\n  .opt-check{opacity:0; transition:opacity .12s ease;}\n  .opt-label{flex:1;}\n  .option.selected, .option.flash{\n    background:var(--sel-bg); border-color:var(--yellow); border-width:1.5px;\n  }\n  .option.selected .opt-circle, .option.flash .opt-circle{\n    background:var(--yellow); border-color:var(--yellow);\n  }\n  .option.selected .opt-check, .option.flash .opt-check{opacity:1;}\n\n  /* ---------- FORM ---------- */\n  .field{margin-bottom:18px;}\n  .field label{display:block; margin-bottom:8px;}\n  .field input, .field textarea{\n    width:100%; font-family:var(--mono); font-size:15px; color:var(--brown);\n    background:var(--cream); border:1px solid var(--opt-border); border-radius:10px;\n    padding:15px 16px; min-height:52px; resize:vertical;\n    transition:border-color .15s ease;\n  }\n  .field textarea{min-height:130px; line-height:1.65;}\n  .field input::placeholder, .field textarea::placeholder{color:rgba(83,40,34,0.4);}\n  .field input:focus, .field textarea:focus{outline:none; border-color:var(--yellow);}\n  .field input.invalid, .field textarea.invalid{border-color:var(--peach);}\n  .field .err{\n    display:none; color:var(--peach); font-size:11px; margin-top:6px; letter-spacing:0.02em;\n  }\n  .field.show-err .err{display:block;}\n  .field .opt-tag{color:var(--muted); text-transform:none; letter-spacing:0;}\n\n  /* ---------- WELCOME ---------- */\n  .welcome{text-align:center;}\n  .welcome .mascot{width:76px; height:auto; margin:6px auto 20px;}\n  .welcome h1{font-size:28px; color:var(--brown); margin-bottom:14px; line-height:1.22;}\n  .welcome .subtext{color:var(--brown); opacity:0.75; max-width:420px; margin:0 auto 24px; font-size:14px;}\n  .pill-row{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:26px;}\n  .pill{\n    border:1.5px solid var(--yellow); color:var(--yellow);\n    font-family:var(--mono); font-size:11px; letter-spacing:0.06em; text-transform:uppercase;\n    padding:7px 14px; border-radius:99px;\n  }\n\n  /* ---------- QUESTION HEADINGS ---------- */\n  .q-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px;}\n  .q-num{font-family:var(--mono); font-size:11px; color:var(--muted); letter-spacing:0.04em; white-space:nowrap;}\n  .q-text{font-family:var(--gupter); font-weight:400; font-size:22px; color:var(--brown); line-height:1.3; margin-bottom:24px;}\n\n  /* contact / open headings */\n  .card h2.title{font-size:24px; margin:4px 0 8px;}\n  .card .subtext.lead{margin-bottom:24px;}\n\n  /* ---------- RESULTS ---------- */\n  .gauge-wrap{text-align:center; margin-bottom:4px;}\n  .gauge{width:260px; max-width:100%; height:auto; margin:0 auto; display:block;}\n  .needle{transform-box:fill-box; transform-origin:center bottom; transition:transform 1.6s cubic-bezier(.34,1.2,.5,1);}\n  .score-big{font-family:var(--gupter); font-weight:700; font-size:46px; color:var(--brown); text-align:center; line-height:1; margin-top:-4px;}\n  .score-cap{font-family:var(--mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); text-align:center; margin-top:8px;}\n  .tier-head{font-family:var(--gupter); font-weight:400; font-size:27px; color:var(--brown); text-align:center; margin-top:20px; line-height:1.18;}\n  .tier-sub{font-family:var(--mono); font-size:15px; line-height:1.7; color:var(--brown); opacity:0.82; text-align:center; max-width:460px; margin:12px auto 0;}\n\n  .divider{height:1px; background:var(--opt-border); margin:30px 0;}\n  .section-cap{font-family:var(--mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:16px;}\n\n  .insight{\n    border-left:3px solid var(--yellow);\n    border-radius:0; padding:1px 0 1px 16px; margin-bottom:20px;\n  }\n  .insight .ins-label{font-family:var(--mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--yellow); font-weight:400; margin-bottom:7px;}\n  .insight .ins-body{font-family:var(--mono); font-size:14px; line-height:1.7; color:var(--brown); opacity:0.82;}\n\n  .next-head{font-family:var(--gupter); font-weight:400; font-size:24px; color:var(--brown); margin-bottom:12px; line-height:1.22;}\n  .next-body{font-family:var(--mono); font-size:15px; line-height:1.7; color:var(--brown); opacity:0.82; margin-bottom:22px;}\n\n  .footer-block{text-align:center; margin-top:30px;}\n  .footer-block .f-line{font-family:var(--mono); font-size:13px; color:var(--brown); opacity:0.7; margin:5px 0; letter-spacing:0.02em;}\n  .footer-block a{color:var(--brown); text-decoration:underline;}\n  .restart-wrap{text-align:center; margin-top:22px;}\n\n  .form-actions{margin-top:6px;}\n\n  /* ---------- RESPONSIVE ---------- */\n  @media (max-width:420px){\n    main{padding:20px 12px 40px;}\n    .card{padding:24px 18px;}\n    .progress-wrap{padding:16px 12px 0;}\n    .welcome h1{font-size:25px;}\n    .q-text{font-size:21px;}\n    .card h2.title{font-size:22px;}\n    .tier-head{font-size:24px;}\n    .score-big{font-size:42px;}\n    .next-head{font-size:21px;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"header\" class=\"hide-progress\">\n  <div class=\"progress-wrap\">\n    <div class=\"progress-label\" id=\"progressLabel\">Question 1 of 15<\u002Fdiv>\n    <div class=\"progress-track\"><div class=\"progress-fill\" id=\"progressFill\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<main id=\"main\">\n  <!-- Screens injected/managed by JS -->\n\n  <!-- WELCOME -->\n  <section class=\"screen\" data-screen=\"welcome\" data-screen-label=\"Welcome\">\n    <div class=\"card welcome\">\n      <img class=\"mascot\" src=\"data:image/svg+xml;base64,PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0iVVRGLTgiPz48c3ZnIGlkPSJ1dWlkLWQxNzE0ZThjLWFiNWYtNDFlMC05YzAwLTIyNjBhMjg4Y2UzMSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIiB2aWV3Qm94PSIwIDAgMjM0LjMyIDE4My4xNiI+PHBhdGggZD0iTTIzMy44NCw5MC4zOWMtMi45OSwyMi4zOS0xOS43Miw0My43Mi00NC43Nyw1Ny4wMS0xOC44OSwxMC4wNC00MC44MywxNS44LTYzLjUzLDE2LjgyLS40OSwxLjUxLTEuMzQsMy4wMS0yLjU2LDQuNTJsLS4xNS4xOWMtOC45NywxMC40My0yOC4wMSwxNS4wNy00MS4zNiwxNC4xMS01LjYxLS40OS0xMy4yNC0xLjgzLTE0LjYzLTcuNzgtLjMtMS42NC4xOS0zLjU2LDEuMjgtNC45LjU1LS43 Fdiv>\n        <div class=\"field\" data-field=\"email\">\n          <label class=\"label\">Email<\u002Flabel>\n          <input type=\"email\" name=\"email\" autocomplete=\"email\" placeholder=\"you@company.com\">\n          <div class=\"err\">Please enter a valid email.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\" data-field=\"location\">\n          <label class=\"label\">Location<\u002Flabel>\n          <input type=\"text\" name=\"location\" autocomplete=\"off\" placeholder=\"City, country\">\n          <div class=\"err\">Please enter your location.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\" data-field=\"phone\">\n          <label class=\"label\">Phone <span class=\"opt-tag\">(optional)<\u002Fspan><\u002Flabel>\n          <input type=\"tel\" name=\"phone\" autocomplete=\"tel\" placeholder=\"Phone number\">\n          <div class=\"err\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"form-actions\">\n          <button type=\"submit\" class=\"btn-brown btn-block\">Continue<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- QUESTION SCREENS injected here -->\n  <div id=\"questionMount\"><\u002Fdiv>\n\n  <!-- RESULTS -->\n  <section class=\"screen\" data-screen=\"results\" data-screen-label=\"Results\">\n    <div class=\"card\" id=\"resultsCard\"><\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<script>\n(function(){\n  \"use strict\";\n\n  /* ============== CONFIG ============== */\n  var WEBHOOK_URL = \"https://hook.eu2.make.com/zkhe6wgdplqyvkvvgqbfpqjm11ugzzrb\";\n  var BOOKING_URL = \"https://wearekiki.com/contact\";\n\n  /* ============== DATA ============== */\n  var bestPractice = [\n    \"Do you have a documented brief template you use every time you hire a freelancer?\",\n    \"Do you vet freelancers against a consistent set of criteria, rather than gut feel or portfolios alone?\",\n    \"Do you have a back-up plan or replacement ready if a freelancer goes silent or underdelivers?\",\n    \"Do you pay freelancers on a predictable, automated schedule, not by chasing invoices?\",\n    \"Do you have written contracts in place before work starts, every time?\",\n    \"Do you track which freelancers have delivered well and which have not, so you can rehire confidently?\",\n    \"Do you set clear scope and deadlines upfront, with check-ins built in?\",\n    \"Do you have a single source of truth for all freelancer work currently in flight?\",\n    \"Do you know your true cost-per-project for freelance work, including your own admin time?\",\n    \"Do you separate the work itself from the relationship management, so you are not the bottleneck?\"\n  ];\n  var bpOptions = [\n    {label:\"Always\",   score:3},\n    {label:\"Usually\",  score:2},\n    {label:\"Sometimes\",score:1},\n    {label:\"Never\",    score:0}\n  ];\n\n  var insightCopy = {\n    1:{label:\"No brief template\", body:\"Without a documented brief, every hire starts from scratch. You're re-explaining the same things, getting inconsistent output, and spending time you don't have correcting work that shouldn't need correcting.\"},\n    2:{label:\"Inconsistent vetting\", body:\"Hiring on gut feel means you're exposed every time. A consistent vetting process isn't about being rigid — it's about having a baseline that protects you from expensive mistakes.\"},\n    3:{label:\"No back-up plan\", body:\"When a freelancer goes quiet, you're left scrambling. A bench of vetted alternates or a managed replacement process turns a crisis into a non-event.\"},\n    4:{label:\"Manual payments\", body:\"Chasing invoices is friction that compounds. Every manual payment is time spent on admin that should be automated — and a source of relationship strain you don't need.\"},\n    5:{label:\"No contracts\", body:\"Working without a contract isn't just a legal risk — it's a clarity risk. Contracts define scope, protect both parties, and remove the ambiguity that causes most freelancer disputes.\"},\n    6:{label:\"No performance tracking\", body:\"If you can't confidently rehire based on past performance, you're starting every search from zero. A simple track record removes that uncertainty entirely.\"},\n    7:{label:\"Unclear scope\", body:\"Scope creep and missed deadlines almost always trace back to ambiguity at the start. Clear briefs, defined deliverables, and built-in check-ins solve this before it starts.\"},\n    8:{label:\"No single source of truth\", body:\"When freelancer work lives across email, Slack, and memory, things fall through. One place for everything in flight isn't a luxury — it's the minimum for running this without losing your mind.\"},\n    9:{label:\"Unknown true cost\", body:\"The invoice is only part of what freelancers cost you. Add your sourcing time, onboarding time, correction time, and admin time — the real number is almost always higher than founders expect.\"},\n    10:{label:\"You're the bottleneck\", body:\"If every freelancer relationship runs through you, your capacity caps theirs. Separating the work from the relationship management is what lets you scale without scaling your own hours.\"}\n  };\n\n  var contextual = [\n    {\n      id:\"q11\",\n      badge:\"About you\",\n      question:\"Which best describes your current situation?\",\n      options:[\n        \"I'm a solo founder doing it all\",\n        \"I run a small team and hire freelancers regularly\",\n        \"I run an agency or studio and subcontract often\",\n        \"I'm scaling fast and freelancer hiring is getting messy\"\n      ]\n    },\n    {\n      id:\"q12\",\n      badge:\"About you\",\n      question:\"Which outcome do you most want to achieve in the next 90 days?\",\n      options:[\n        \"Stop wasting time managing freelancers myself\",\n        \"Find more reliable people I can trust\",\n        \"Reduce the admin and payment headaches\",\n        \"Build a repeatable hiring system that doesn't depend on me\",\n        \"Scale freelancer capacity without scaling chaos\"\n      ]\n    },\n    {\n      id:\"q13\",\n      badge:\"About you\",\n      question:\"What's the biggest obstacle stopping you right now?\",\n      options:[\n        \"I don't have time to source and vet properly\",\n        \"I keep getting burned by unreliable freelancers\",\n        \"The admin — contracts, payments, chasing — eats my week\",\n        \"I've tried systems before and they didn't stick\"\n      ]\n    },\n    {\n      id:\"q14\",\n      badge:\"About you\",\n      question:\"Which solution feels most like the right fit?\",\n      options:[\n        \"Educational resources I can apply myself\",\n        \"1-on-1 coaching to build my own system\",\n        \"Software and tools to streamline what I already do\",\n        \"Someone to handle the whole thing for me\"\n      ]\n    }\n  ];\n\n  /* ============== STATE ============== */\n  var state = {\n    contact:{name:\"\",email:\"\",location:\"\",phone:\"\"},\n    bp:{},      // index(0-9) -> score\n    ctx:{},     // q11..q14 -> answer text\n    q15:\"\"\n  };\n\n  /* ============== SCREEN BUILD ============== */\n  // order: welcome, contact, [bp x10], [ctx x4], q15, results\n  var screens = []; // list of DOM section nodes in order\n  var QUESTION_TOTAL = 15;\n\n  function buildQuestionScreens(){\n    var mount = document.getElementById('questionMount');\n    var html = \"\";\n    var circle = '<span class=\"opt-circle\"><svg class=\"opt-check\" width=\"10\" height=\"8\" viewBox=\"0 0 10 8\" fill=\"none\"><path d=\"M1 4L3.5 6.5L9 1\" stroke=\"#532822\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg><\u002Fspan>';\n\n    // Best practice Q1..Q10 -> questionNumber 1..10\n    for(var i=0;i<bestPractice.length;i++){\n      var qn = i+1;\n      var opts = \"\";\n      for(var j=0;j<bpOptions.length;j++){\n        var o = bpOptions[j];\n        opts += '<button class=\"option\" data-bp=\"'+i+'\" data-score=\"'+o.score+'\">'+\n                  circle+\n                  '<span class=\"opt-label\">'+o.label+'<\u002Fspan>'+\n                '<\u002Fbutton>';\n      }\n      html += '<section class=\"screen\" data-screen=\"bp'+i+'\" data-question=\"'+qn+'\" data-screen-label=\"Q'+qn+'\">'+\n                '<div class=\"card\">'+\n                  '<div class=\"q-head\">'+\n                    '<span class=\"label label-badge\" style=\"margin-bottom:0;\">Best practice check<\u002Fspan>'+\n                    '<span class=\"q-num\">'+qn+' / 10<\u002Fspan>'+\n                  '<\u002Fdiv>'+\n                  '<p class=\"q-text\">'+bestPractice[i]+'<\u002Fp>'+\n                  '<div class=\"options\">'+opts+'<\u002Fdiv>'+\n                '<\u002Fdiv>'+\n              '<\u002Fsection>';\n    }\n\n    // Contextual Q11..Q14 -> questionNumber 11..14\n    for(var k=0;k<contextual.length;k++){\n      var c = contextual[k];\n      var qn2 = 11+k;\n      var copts = \"\";\n      for(var m=0;m<c.options.length;m++){\n        copts += '<button class=\"option\" data-ctx=\"'+c.id+'\" data-value=\"'+encodeURIComponent(c.options[m])+'\">'+\n                   circle+\n                   '<span class=\"opt-label\">'+c.options[m]+'<\u002Fspan>'+\n                 '<\u002Fbutton>';\n      }\n      html += '<section class=\"screen\" data-screen=\"'+c.id+'\" data-question=\"'+qn2+'\" data-screen-label=\"Q'+qn2+'\">'+\n                '<div class=\"card\">'+\n                  '<div class=\"q-head\">'+\n                    '<span class=\"label label-badge\" style=\"margin-bottom:0;\">'+c.badge+'<\u002Fspan>'+\n                    '<span class=\"q-num\">'+qn2+' / 15<\u002Fspan>'+\n                  '<\u002Fdiv>'+\n                  '<p class=\"q-text\">'+c.question+'<\u002Fp>'+\n                  '<div class=\"options\">'+copts+'<\u002Fdiv>'+\n                '<\u002Fdiv>'+\n              '<\u002Fsection>';\n    }\n\n    // Q15 open text\n    html += '<section class=\"screen\" data-screen=\"q15\" data-question=\"15\" data-screen-label=\"Q15\">'+\n              '<div class=\"card\">'+\n                '<div class=\"q-head\">'+\n                  '<span class=\"label label-badge\" style=\"margin-bottom:0;\">Final question<\u002Fspan>'+\n                  '<span class=\"q-num\">15 / 15<\u002Fspan>'+\n                '<\u002Fdiv>'+\n                '<p class=\"q-text\">Is there anything else we should know?<\u002Fp>'+\n                '<div class=\"field\" style=\"margin-bottom:18px;\">'+\n                  '<textarea id=\"q15Input\" placeholder=\"Anything you\\'d like us to know (optional)\"><\u002Ftextarea>'+\n                '<\u002Fdiv>'+\n                '<button class=\"btn-brown btn-block\" id=\"q15Submit\">See my results<\u002Fbutton>'+\n              '<\u002Fdiv>'+\n            '<\u002Fsection>';\n\n    mount.innerHTML = html;\n  }\n\n  /* ============== NAVIGATION ============== */\n  var order = []; // array of data-screen keys\n  var current = 0;\n\n  function collectOrder(){\n    screens = Array.prototype.slice.call(document.querySelectorAll('.screen'));\n    order = screens.map(function(s){return s.getAttribute('data-screen');});\n  }\n\n  function showScreen(idx){\n    if(idx<0 || idx>=screens.length) return;\n    current = idx;\n    screens.forEach(function(s,i){\n      s.classList.toggle('active', i===idx);\n    });\n    var key = order[idx];\n    var section = screens[idx];\n\n    // progress + header\n    var header = document.getElementById('header');\n    var qAttr = section.getAttribute('data-question');\n    if(key==='welcome' || key==='results'){\n      header.classList.add('hide-progress');\n    }else{\n      header.classList.remove('hide-progress');\n      var label = document.getElementById('progressLabel');\n      var fill = document.getElementById('progressFill');\n      if(qAttr){\n        var qn = parseInt(qAttr,10);\n        label.textContent = 'Question '+qn+' of '+QUESTION_TOTAL;\n        fill.style.width = ((qn/QUESTION_TOTAL)*100)+'%';\n      }else{\n        // contact screen\n        label.textContent = 'Your details';\n        fill.style.width = '0%';\n      }\n    }\n\n    // persist\n    saveState();\n    try{ window.scrollTo({top:0, behavior:'instant'}); }catch(e){ window.scrollTo(0,0); }\n\n    if(key==='results'){ renderResults(); }\n  }\n\n  function goNext(){ showScreen(current+1); }\n\n  function indexOfScreen(key){ return order.indexOf(key); }\n\n  /* ============== INTERACTIONS ============== */\n  function wireEvents(){\n    // welcome start button + any [data-next]\n    document.querySelectorAll('[data-next]').forEach(function(btn){\n      btn.addEventListener('click', goNext);\n    });\n\n    // contact form\n    var form = document.getElementById('contactForm');\n    form.addEventListener('submit', function(e){\n      e.preventDefault();\n      if(validateContact(form)){\n        goNext();\n      }\n    });\n    // clear error on input\n    form.querySelectorAll('input').forEach(function(inp){\n      inp.addEventListener('input', function(){\n        var fieldEl = inp.closest('.field');\n        fieldEl.classList.remove('show-err');\n        inp.classList.remove('invalid');\n      });\n    });\n\n    // delegated clicks for options (bp + ctx)\n    document.getElementById('questionMount').addEventListener('click', function(e){\n      var opt = e.target.closest('.option');\n      if(opt){ handleOptionClick(opt); return; }\n    });\n\n    // q15 submit\n    var q15btn = document.getElementById('q15Submit');\n    if(q15btn){\n      q15btn.addEventListener('click', function(){\n        var ta = document.getElementById('q15Input');\n        state.q15 = ta ? ta.value.trim() : \"\";\n        saveState();\n        goNext();\n      });\n    }\n  }\n\n  function handleOptionClick(opt){\n    var section = opt.closest('.screen');\n    // record answer\n    if(opt.hasAttribute('data-bp')){\n      var bpIdx = parseInt(opt.getAttribute('data-bp'),10);\n      var sc = parseInt(opt.getAttribute('data-score'),10);\n      state.bp[bpIdx] = sc;\n    }else if(opt.hasAttribute('data-ctx')){\n      var cid = opt.getAttribute('data-ctx');\n      var val = decodeURIComponent(opt.getAttribute('data-value'));\n      state.ctx[cid] = val;\n    }\n    // mark selected siblings\n    var sibs = section.querySelectorAll('.option');\n    sibs.forEach(function(s){ s.classList.remove('selected'); });\n    opt.classList.add('flash');\n    // disable further clicks briefly\n    section.style.pointerEvents = 'none';\n    saveState();\n    setTimeout(function(){\n      opt.classList.remove('flash');\n      section.style.pointerEvents = '';\n      goNext();\n    }, 320);\n  }\n\n  function validateContact(form){\n    var ok = true;\n    var required = ['name','email','location'];\n    required.forEach(function(fname){\n      var fieldEl = form.querySelector('[data-field=\"'+fname+'\"]');\n      var inp = fieldEl.querySelector('input');\n      var v = inp.value.trim();\n      var valid = v.length>0;\n      if(fname==='email'){\n        valid = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(v);\n      }\n      if(!valid){\n        ok = false;\n        fieldEl.classList.add('show-err');\n        inp.classList.add('invalid');\n      }else{\n        fieldEl.classList.remove('show-err');\n        inp.classList.remove('invalid');\n      }\n    });\n    // store all values (incl phone)\n    state.contact.name = form.querySelector('[name=\"name\"]').value.trim();\n    state.contact.email = form.querySelector('[name=\"email\"]').value.trim();\n    state.contact.location = form.querySelector('[name=\"location\"]').value.trim();\n    state.contact.phone = form.querySelector('[name=\"phone\"]').value.trim();\n    saveState();\n    return ok;\n  }\n\n  /* ============== SCORING & RESULTS ============== */\n  function totalScore(){\n    var t = 0;\n    for(var i=0;i<10;i++){ t += (state.bp[i]||0); }\n    return t;\n  }\n\n  function tierFor(score){\n    if(score<=12) return {key:'low', head:\"You're flying blind.\", sub:\"Hiring freelancers is costing you more than it should — in time, money, and stress. The good news: the fix isn't more effort. It's removing yourself from the work that shouldn't be yours.\"};\n    if(score<=22) return {key:'mid', head:\"Strong instincts, leaky system.\", sub:\"You've got the right ideas but the execution is patchy. The same problems keep repeating because the system isn't yours yet — it lives in your head. That's where things break.\"};\n    return {key:'high', head:\"You're doing the work most founders skip.\", sub:\"Your process is genuinely strong. The question now is whether you should still be the one running it.\"};\n  }\n\n  function pickInsights(){\n    // build array of {q:1..10, score}\n    var arr = [];\n    for(var i=0;i<10;i++){\n      arr.push({q:i+1, score:(state.bp[i]!==undefined?state.bp[i]:0)});\n    }\n    // sort by score ascending, tiebreak by question order\n    arr.sort(function(a,b){\n      if(a.score!==b.score) return a.score-b.score;\n      return a.q-b.q;\n    });\n    // take three lowest\n    return [arr[0].q, arr[1].q, arr[2].q].map(function(q){\n      return insightCopy[q];\n    });\n  }\n\n  function nextSteps(score, q14){\n    var high = score>=23;\n    var mid = score>=13 && score<=22;\n    var low = score<=12;\n    var solveAll = \"Someone to handle the whole thing for me\";\n    var eduSelf = \"Educational resources I can apply myself\";\n    var coaching = \"1-on-1 coaching to build my own system\";\n    var software = \"Software and tools to streamline what I already do\";\n\n    if(high){\n      return {head:\"You're ready. Let's talk.\", body:\"Your process is already stronger than most. What Kiki offers isn't a fix — it's an upgrade. We take the parts you're still running yourself and hand them to a system that doesn't depend on you. Book a one-to-one call and we'll map out exactly where Kiki fits.\", cta:\"Book a one-to-one call\"};\n    }\n    if(mid){\n      if(q14===solveAll) return {head:\"You're close. Kiki can close the gap.\", body:\"You've got the instincts — the system just isn't locked in yet. Kiki slots in and handles the layer you keep dropping: sourcing, vetting, payments, relationship management. One call is enough to show you what that looks like in practice.\", cta:\"Book a discovery call\"};\n      if(q14===eduSelf) return {head:\"Start with the right foundations.\", body:\"You're further along than most founders at your stage. A few targeted fixes will close the gap. We're happy to share what those are on a no-pressure call — no obligation, just a clear picture of what to prioritise.\", cta:\"Book a free call\"};\n      if(q14===coaching || q14===software) return {head:\"Let's build it properly.\", body:\"You're in the right place. Your instincts are sound but the infrastructure isn't there yet. A discovery call gives you a clear view of what to fix first and what to stop doing entirely.\", cta:\"Book a discovery call\"};\n      // fallback for mid (shouldn't happen, all 4 covered)\n      return {head:\"Let's build it properly.\", body:\"You're in the right place. Your instincts are sound but the infrastructure isn't there yet. A discovery call gives you a clear view of what to fix first and what to stop doing entirely.\", cta:\"Book a discovery call\"};\n    }\n    // low\n    if(q14===solveAll) return {head:\"Hand it over. Seriously.\", body:\"You already know what you need — someone else to run this. That's exactly what Kiki does. We source, vet, and manage the entire freelancer relationship layer so you get the output without the overhead. Let's talk.\", cta:\"Book a call\"};\n    if(q14===eduSelf) return {head:\"Let's get you started on the right foot.\", body:\"There's a lot of ground to cover, but the foundations aren't complicated. A 20-minute call with Kiki will give you a clear picture of what to fix first — no sales pitch, just clarity. Take it from there.\", cta:\"Book a free call\"};\n    return {head:\"You need a system, not a shortcut.\", body:\"Right now the process is costing you more than you're tracking. The fastest path forward is a conversation about what that system looks like for your business specifically. Book a call and we'll map it out.\", cta:\"Book a call\"};\n  }\n\n  // SVG speedometer: semicircle gauge 0..30, needle rotates -90deg (left) to +90deg (right)\n  function gaugeSVG(){\n    // dial spans 180deg from left (180°) to right (0°)\n    // zones: red 0-12, amber 13-22, green 23-30\n    var cx=140, cy=140, r=110;\n    function pt(angDeg){\n      var a = (180-angDeg)*Math.PI/180; // 0 score -> 180deg(left), 30 -> 0deg(right)\n      return [cx + r*Math.cos(a), cy - r*Math.sin(a)];\n    }\n    function scoreToAngle(s){ return (s/30)*180; } // 0..180 along the arc from left\n    function arc(s0,s1,color){\n      var p0 = pt(scoreToAngle(s0));\n      var p1 = pt(scoreToAngle(s1));\n      var large = (scoreToAngle(s1)-scoreToAngle(s0))>180?1:0;\n      // sweep direction: from left to right along top -> sweep=1\n      return '<path d=\"M '+p0[0].toFixed(1)+' '+p0[1].toFixed(1)+' A '+r+' '+r+' 0 '+large+' 1 '+p1[0].toFixed(1)+' '+p1[1].toFixed(1)+'\" fill=\"none\" stroke=\"'+color+'\" stroke-width=\"18\" stroke-linecap=\"butt\"/>';\n    }\n    var svg = '<svg class=\"gauge\" viewBox=\"0 0 280 170\" role=\"img\" aria-label=\"Score gauge\">';\n    // zones\n    svg += arc(0,12, '#E25A4A');     // red\n    svg += arc(12,22, '#FF834C');    // amber/peach\n    svg += arc(22,30, '#7FB069');    // green\n    // tick labels\n    svg += '<text x=\"22\" y=\"162\" fill=\"#532822\" opacity=\"0.5\" font-family=\"Courier New, monospace\" font-size=\"11\">0<\u002Ftext>';\n    svg += '<text x=\"248\" y=\"162\" fill=\"#532822\" opacity=\"0.5\" font-family=\"Courier New, monospace\" font-size=\"11\">30<\u002Ftext>';\n    // needle (points up at score; we rotate it). Drawn pointing up from pivot.\n    svg += '<g id=\"needleGroup\" style=\"transform-origin:140px 140px;\">';\n    svg += '<line class=\"needle\" id=\"needle\" x1=\"140\" y1=\"140\" x2=\"140\" y2=\"44\" stroke=\"#532822\" stroke-width=\"4\" stroke-linecap=\"round\"/>';\n    svg += '<\u002Fg>';\n    svg += '<circle cx=\"140\" cy=\"140\" r=\"9\" fill=\"#FFD05D\"/>';\n    svg += '<\u002Fsvg>';\n    return svg;\n  }\n\n  function renderResults(){\n    var score = totalScore();\n    var tier = tierFor(score);\n    var insights = pickInsights();\n    var q14 = state.ctx['q14'] || \"\";\n    var ns = nextSteps(score, q14);\n\n    var html = \"\";\n    // SECTION 1 — reveal\n    html += '<div class=\"gauge-wrap\">'+ gaugeSVG() +'<\u002Fdiv>';\n    html += '<div class=\"score-big\">'+score+' / 30<\u002Fdiv>';\n    html += '<div class=\"score-cap\">Your hiring health score<\u002Fdiv>';\n    html += '<h2 class=\"tier-head\">'+tier.head+'<\u002Fh2>';\n    html += '<p class=\"tier-sub\">'+tier.sub+'<\u002Fp>';\n\n    // SECTION 2 — insights\n    html += '<div class=\"divider\"><\u002Fdiv>';\n    html += '<div class=\"section-cap\">What stood out<\u002Fdiv>';\n    insights.forEach(function(ins){\n      html += '<div class=\"insight\"><div class=\"ins-label\">'+ins.label+'<\u002Fdiv><div class=\"ins-body\">'+ins.body+'<\u002Fdiv><\u002Fdiv>';\n    });\n\n    // SECTION 3 — next steps\n    html += '<div class=\"divider\"><\u002Fdiv>';\n    html += '<div class=\"section-cap\">Your next step<\u002Fdiv>';\n    html += '<h3 class=\"next-head\">'+ns.head+'<\u002Fh3>';\n    html += '<p class=\"next-body\">'+ns.body+'<\u002Fp>';\n    html += '<a class=\"btn-primary btn-block\" href=\"'+BOOKING_URL+'\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;\">'+ns.cta+'<\u002Fa>';\n\n    // SECTION 4 — footer\n    html += '<div class=\"footer-block\">';\n    html += '<div class=\"f-line\"><a href=\"https://www.wearekiki.com\" target=\"_blank\" rel=\"noopener\">www.wearekiki.com<\u002Fa><\u002Fdiv>';\n    html += '<div class=\"f-line\"><a href=\"mailto:hello@wearekiki.com\">hello@wearekiki.com<\u002Fa><\u002Fdiv>';\n    html += '<\u002Fdiv>';\n    html += '<div class=\"restart-wrap\"><button class=\"btn-ghost\" id=\"restartBtn\">Start again<\u002Fbutton><\u002Fdiv>';\n\n    document.getElementById('resultsCard').innerHTML = html;\n\n    // restart\n    document.getElementById('restartBtn').addEventListener('click', resetAll);\n\n    // animate needle from left (-90) to score\n    var needle = document.getElementById('needle');\n    if(needle){\n      needle.style.transform = 'rotate(-90deg)';\n      // force reflow then animate to final position\n      void needle.getBoundingClientRect();\n      var ang = (score/30)*180 - 90; // -90 (left) .. +90 (right)\n      setTimeout(function(){ needle.style.transform = 'rotate('+ang+'deg)'; }, 120);\n    }\n\n    // fire webhook\n    fireWebhook(score, tier);\n  }\n\n  /* ============== WEBHOOK ============== */\n  function fireWebhook(score, tier){\n    if(!WEBHOOK_URL || WEBHOOK_URL===\"https://hook.eu2.make.com/zkhe6wgdplqyvkvvgqbfpqjm11ugzzrb\") return; // not configured; skip silently\n    try{\n      var bpAnswers = [];\n      for(var i=0;i<10;i++){\n        var sc = (state.bp[i]!==undefined?state.bp[i]:null);\n        var lbl = \"\";\n        bpOptions.forEach(function(o){ if(o.score===sc) lbl=o.label; });\n        bpAnswers.push({question:bestPractice[i], answer:lbl, score:sc});\n      }\n      var ctxAnswers = [];\n      contextual.forEach(function(c){\n        ctxAnswers.push({question:c.question, answer:state.ctx[c.id]||\"\"});\n      });\n      ctxAnswers.push({question:\"Is there anything else we should know?\", answer:state.q15||\"\"});\n\n      var payload = {\n        name:state.contact.name,\n        email:state.contact.email,\n        location:state.contact.location,\n        phone:state.contact.phone,\n        bestPracticeAnswers:bpAnswers,\n        totalScore:score,\n        maxScore:30,\n        resultTier:tier.head,\n        contextualAnswers:ctxAnswers,\n        timestamp:new Date().toISOString()\n      };\n      fetch(WEBHOOK_URL, {\n        method:'POST',\n        headers:{'Content-Type':'application/json'},\n        body:JSON.stringify(payload),\n        keepalive:true\n      }).catch(function(){ /* fire and forget */ });\n    }catch(e){ /* never block results */ }\n  }\n\n  /* ============== PERSISTENCE ============== */\n  var LS_KEY = 'kikiQuizState_v1';\n  function saveState(){\n    try{\n      localStorage.setItem(LS_KEY, JSON.stringify({state:state, current:current}));\n    }catch(e){}\n  }\n  function loadState(){\n    try{\n      var raw = localStorage.getItem(LS_KEY);\n      if(!raw) return null;\n      return JSON.parse(raw);\n    }catch(e){ return null; }\n  }\n  function resetAll(){\n    state = {contact:{name:\"\",email:\"\",location:\"\",phone:\"\"}, bp:{}, ctx:{}, q15:\"\"};\n    try{ localStorage.removeItem(LS_KEY); }catch(e){}\n    // clear UI selections + form\n    document.querySelectorAll('.option').forEach(function(o){ o.classList.remove('selected','flash'); });\n    var form = document.getElementById('contactForm');\n    if(form){ form.reset(); form.querySelectorAll('.field').forEach(function(f){f.classList.remove('show-err');}); }\n    var q15i = document.getElementById('q15Input'); if(q15i) q15i.value=\"\";\n    showScreen(0);\n  }\n\n  function restoreUI(){\n    // restore form fields\n    var form = document.getElementById('contactForm');\n    if(form){\n      form.querySelector('[name=\"name\"]').value = state.contact.name||\"\";\n      form.querySelector('[name=\"email\"]').value = state.contact.email||\"\";\n      form.querySelector('[name=\"location\"]').value = state.contact.location||\"\";\n      form.querySelector('[name=\"phone\"]').value = state.contact.phone||\"\";\n    }\n    // restore bp selections\n    Object.keys(state.bp).forEach(function(idx){\n      var sc = state.bp[idx];\n      var btn = document.querySelector('.option[data-bp=\"'+idx+'\"][data-score=\"'+sc+'\"]');\n      if(btn) btn.classList.add('selected');\n    });\n    // restore ctx selections\n    Object.keys(state.ctx).forEach(function(cid){\n      var val = state.ctx[cid];\n      document.querySelectorAll('.option[data-ctx=\"'+cid+'\"]').forEach(function(b){\n        if(decodeURIComponent(b.getAttribute('data-value'))===val) b.classList.add('selected');\n      });\n    });\n    // restore q15\n    var q15i = document.getElementById('q15Input'); if(q15i) q15i.value = state.q15||\"\";\n  }\n\n  /* ============== INIT ============== */\n  function init(){\n    buildQuestionScreens();\n    collectOrder();\n    wireEvents();\n\n    var saved = loadState();\n    if(saved && saved.state){\n      state = saved.state;\n      // backfill any missing keys\n      state.contact = state.contact || {name:\"\",email:\"\",location:\"\",phone:\"\"};\n      state.bp = state.bp || {};\n      state.ctx = state.ctx || {};\n      state.q15 = state.q15 || \"\";\n      restoreUI();\n      var startIdx = (typeof saved.current==='number' && saved.current>=0 && saved.current<order.length) ? saved.current : 0;\n      showScreen(startIdx);\n    }else{\n      showScreen(0);\n    }\n  }\n\n  if(document.readyState==='loading'){\n    document.addEventListener('DOMContentLoaded', init);\n  }else{ init(); }\n\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
